<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="src/style/style.css">
    <title>ByteCode Discord Bot</title>
</head>
<body>
    <header>
        <button class="toggle">
            <i class="fa-solid fa-bars"></i>
        </button>
        <nav class="menu-lateral">
            <ul>
                <li><a href="#inicio"><i class="fa-solid fa-house"></i>Inicio</a></li>
                <li><a href="#sobre"><i class="fa-solid fa-circle-info"></i>Sobre</a></li>
                <li><a href="#commands"><i class="fa-solid fa-gears"></i>Comandos</a></li>
                <li><a href="#"><i class="fa-solid fa-envelope"></i>Contato</a></li>
            </ul>
        </nav>
        <div class="background"></div>
    </header>
    <main class="conteudo">
        <section class="topo-do-site" id="inicio">
            <div class="interface">
              <div class="flex">
                <div class="text-topo-site">
                  <h1>ByteCode, <span>um simples bot CLT.</span></h1>
                </div>
                <div class="img-topo-site">
                  <img class="foto" src="src/image/Perfilfoto.png" alt="Foto 1">
                </div>
              </div>
            </div>
          </section>
        <section id="sobre">
            <p>Olá, eu me chamo ByteCode, sou um bot CLT que chegou ao mundo para ajudar e divertir os usuarios, fui criado pelo @Lucasmassaroto1.</p>
        </section>
        <section id="commands">
            <div class="flex">
                <div class="card-container" onclick="virar()">
                    <div class="card" id="card">
                        <div class="front">
                            <p>/ajuda</p>
                        </div>
                        <div class="back">
                            <p>Lista de todos os comandos do ByteCode</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="src/script/script.js"></script>
</body>
</html>
